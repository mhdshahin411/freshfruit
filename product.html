<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Product — Daily Fresh Dubai</title>
  <meta name="description" content="Premium fresh produce with same-day delivery across Dubai." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: {
      fontFamily: { display: ["Poppins","sans-serif"], sans: ["Inter","sans-serif"] },
      colors: { brand: { 50:"#ecfdf3",100:"#d1fadf",200:"#a6f4c5",300:"#6ce9a6",400:"#32d583",500:"#22c55e",600:"#16a34a",700:"#15803d",800:"#166534",900:"#14532d" } },
    } } };
  </script>
  <link rel="stylesheet" href="assets/css/styles.css" />
  <script defer src="assets/js/products.js"></script>
  <script defer src="assets/js/cart.js"></script>
  <script defer src="assets/js/site.js"></script>
</head>
<body data-page="product" class="bg-white text-neutral-800">
  <header data-header></header>

  <main class="mx-auto max-w-7xl px-4 py-6 md:py-10" data-product-root>
    <!-- content injected -->
  </main>

  <section class="mx-auto max-w-7xl px-4 pb-20">
    <h2 class="font-display font-extrabold text-2xl md:text-3xl text-neutral-900 mb-6">You may also like</h2>
    <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 md:gap-6" data-related></div>
  </section>

  <div data-footer></div>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const id = new URLSearchParams(location.search).get("id");
      const p = getProduct(id) || PRODUCTS[0];
      const root = document.querySelector("[data-product-root]");
      const disc = discountPct(p);
      const stars = (r)=>{let s="";for(let i=1;i<=5;i++)s+=`<svg viewBox="0 0 24 24" fill="${i<=Math.round(r)?'currentColor':'none'}" stroke="currentColor" stroke-width="1.5" class="w-4 h-4"><path d="M12 2l3 6.5 7 .7-5.2 4.7 1.5 6.9L12 17.8 5.7 20.8l1.5-6.9L2 9.2l7-.7z"/></svg>`;return s;};

      document.title = `${p.name} — Daily Fresh Dubai`;

      root.innerHTML = `
        <nav class="text-sm text-neutral-400 mb-5">
          <a href="index.html" class="hover:text-brand-700">Home</a> <span class="mx-1">/</span>
          <a href="shop.html?cat=${p.category}" class="hover:text-brand-700 capitalize">${p.category}</a> <span class="mx-1">/</span>
          <span class="text-neutral-700 font-medium">${p.name}</span>
        </nav>
        <div class="grid lg:grid-cols-2 gap-8 lg:gap-12">
          <!-- gallery -->
          <div data-reveal>
            <div class="relative rounded-3xl overflow-hidden bg-neutral-50 ring-1 ring-neutral-100 zoom-wrap aspect-square" data-zoom>
              ${p.badge?`<span class="absolute z-10 top-4 left-4 text-white text-xs font-bold px-3 py-1.5 rounded-full bg-gradient-to-r from-orange-500 to-amber-500 shadow">${p.badge}</span>`:""}
              ${disc?`<span class="absolute z-10 top-4 right-4 bg-white text-orange-600 text-sm font-extrabold px-3 py-1.5 rounded-full shadow">-${disc}%</span>`:""}
              <img src="${p.img}" alt="${p.name}" class="w-full h-full object-cover cursor-zoom-in" data-zoom-img />
            </div>
            <div class="grid grid-cols-4 gap-3 mt-3">
              ${[p.img, ...PRODUCTS.filter(x=>x.category===p.category&&x.id!==p.id).slice(0,3).map(x=>x.img)]
                .map((src,i)=>`<button data-thumb="${src}" class="rounded-xl overflow-hidden aspect-square ring-2 ${i===0?'ring-brand-500':'ring-transparent'} hover:ring-brand-400 transition"><img src="${src}" class="w-full h-full object-cover" loading="lazy"/></button>`).join("")}
            </div>
          </div>

          <!-- info -->
          <div data-reveal data-reveal-delay="100">
            <div class="flex items-center gap-2 text-sm">
              <span class="rounded-full bg-brand-50 text-brand-700 font-semibold px-3 py-1 capitalize">${p.category}</span>
              <span class="text-neutral-400">Origin: <b class="text-neutral-600">${p.origin}</b></span>
            </div>
            <h1 class="font-display font-extrabold text-3xl md:text-4xl text-neutral-900 mt-3 leading-tight">${p.name}</h1>
            <div class="flex items-center gap-3 mt-3">
              <div class="flex text-amber-400">${stars(p.rating)}</div>
              <span class="text-sm text-neutral-500 font-medium">${p.rating} · ${p.reviews} reviews</span>
            </div>
            <p class="mt-4 text-neutral-600 leading-relaxed">${p.desc}</p>

            <div class="flex items-end gap-3 mt-6">
              <span class="text-4xl font-extrabold text-neutral-900">${formatAED(p.price)}</span>
              ${p.oldPrice?`<span class="text-xl text-neutral-400 line-through mb-1">${formatAED(p.oldPrice)}</span><span class="mb-1.5 text-sm font-bold text-orange-600">Save ${formatAED(p.oldPrice-p.price)}</span>`:""}
            </div>
            <p class="text-sm text-neutral-400 mt-1">${p.unit} · <span class="text-brand-600 font-semibold">In stock</span></p>

            <!-- quantity + add -->
            <div class="flex flex-wrap items-center gap-3 mt-7">
              <div class="inline-flex items-center rounded-full border-2 border-neutral-200 h-14">
                <button data-qty-minus class="grid place-items-center w-12 h-full text-neutral-500 hover:text-brand-700 text-xl">−</button>
                <input data-qty value="1" inputmode="numeric" class="w-12 text-center font-bold text-lg outline-none" />
                <button data-qty-plus class="grid place-items-center w-12 h-full text-neutral-500 hover:text-brand-700 text-xl">+</button>
              </div>
              <button data-add-detail class="flex-1 min-w-[180px] inline-flex items-center justify-center gap-2 rounded-full bg-brand-600 hover:bg-brand-700 text-white font-bold h-14 px-6 shadow-xl shadow-brand-500/25 hover:scale-[1.02] transition">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" class="w-5 h-5"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.7 13.4a2 2 0 0 0 2 1.6h9.7a2 2 0 0 0 2-1.6L23 6H6"/></svg>
                Add to Cart
              </button>
              <button data-wish-detail class="grid place-items-center w-14 h-14 rounded-full border-2 border-neutral-200 hover:border-orange-300 transition ${inWishlist(p.id)?'text-orange-500 border-orange-300':'text-neutral-400'}" aria-label="Wishlist">
                <svg viewBox="0 0 24 24" fill="${inWishlist(p.id)?'currentColor':'none'}" stroke="currentColor" stroke-width="2" class="w-6 h-6"><path d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.6l-1-1a5.5 5.5 0 1 0-7.8 7.8l1 1L12 21l7.8-7.6 1-1a5.5 5.5 0 0 0 0-7.8z"/></svg>
              </button>
            </div>

            <a href="https://wa.me/${WHATSAPP}?text=Hi!%20I'd%20like%20to%20order%20${encodeURIComponent(p.name)}." target="_blank" rel="noopener" class="mt-3 w-full inline-flex items-center justify-center gap-2 rounded-full bg-[#25D366] text-white font-semibold h-13 py-3.5 hover:brightness-105 transition">
              <svg viewBox="0 0 24 24" fill="currentColor" class="w-5 h-5"><path d="M17.5 14.4c-.3-.15-1.77-.87-2.04-.97-.27-.1-.47-.15-.67.15-.2.3-.77.97-.94 1.17-.17.2-.35.22-.65.07-.3-.15-1.26-.46-2.4-1.48-.89-.79-1.49-1.77-1.66-2.07-.17-.3-.02-.46.13-.61.13-.13.3-.35.45-.52.15-.17.2-.3.3-.5.1-.2.05-.37-.02-.52-.07-.15-.67-1.62-.92-2.22-.24-.58-.49-.5-.67-.51h-.57c-.2 0-.52.07-.8.37-.27.3-1.04 1.02-1.04 2.48s1.07 2.88 1.22 3.08c.15.2 2.1 3.2 5.08 4.49.71.31 1.26.49 1.69.63.71.23 1.36.2 1.87.12.57-.09 1.77-.72 2.02-1.42.25-.7.25-1.29.17-1.42-.07-.13-.27-.2-.57-.35zM12 2a10 10 0 0 0-8.53 15.26L2 22l4.86-1.27A10 10 0 1 0 12 2z"/></svg>
              Order this on WhatsApp
            </a>

            <!-- trust row -->
            <div class="grid grid-cols-3 gap-3 mt-7 pt-7 border-t border-neutral-100 text-center">
              <div><p class="text-xl">🚚</p><p class="text-xs font-semibold text-neutral-700 mt-1">Same-day<br/>delivery</p></div>
              <div><p class="text-xl">🌿</p><p class="text-xs font-semibold text-neutral-700 mt-1">100% farm<br/>fresh</p></div>
              <div><p class="text-xl">🛡️</p><p class="text-xs font-semibold text-neutral-700 mt-1">Freshness<br/>guarantee</p></div>
            </div>
          </div>
        </div>`;

      // qty handlers
      const qtyEl = root.querySelector("[data-qty]");
      const clamp = ()=>{ let n=parseInt(qtyEl.value)||1; qtyEl.value=Math.max(1,Math.min(99,n)); };
      root.querySelector("[data-qty-minus]").onclick=()=>{ qtyEl.value=Math.max(1,(parseInt(qtyEl.value)||1)-1); };
      root.querySelector("[data-qty-plus]").onclick=()=>{ qtyEl.value=Math.min(99,(parseInt(qtyEl.value)||1)+1); };
      qtyEl.oninput=clamp;
      root.querySelector("[data-add-detail]").onclick=()=>addToCart(p.id, parseInt(qtyEl.value)||1);
      const wishBtn = root.querySelector("[data-wish-detail]");
      wishBtn.onclick=()=>{ const on=toggleWishlist(p.id); wishBtn.classList.toggle("text-orange-500",on); wishBtn.classList.toggle("border-orange-300",on); wishBtn.classList.toggle("text-neutral-400",!on); wishBtn.querySelector("svg").setAttribute("fill",on?"currentColor":"none"); };

      // thumbnails
      const mainImg = root.querySelector("[data-zoom-img]");
      root.querySelectorAll("[data-thumb]").forEach(t=>t.onclick=()=>{
        mainImg.src=t.dataset.thumb;
        root.querySelectorAll("[data-thumb]").forEach(x=>x.classList.remove("ring-brand-500"));
        t.classList.add("ring-brand-500");
      });

      // hover zoom lens
      const zoom = root.querySelector("[data-zoom]");
      zoom.addEventListener("mousemove",(e)=>{
        const r=zoom.getBoundingClientRect();
        const x=((e.clientX-r.left)/r.width)*100, y=((e.clientY-r.top)/r.height)*100;
        mainImg.style.transformOrigin=`${x}% ${y}%`; mainImg.style.transform="scale(2)";
      });
      zoom.addEventListener("mouseleave",()=>{ mainImg.style.transform="scale(1)"; });

      // related
      const related = PRODUCTS.filter(x=>x.category===p.category&&x.id!==p.id).slice(0,4);
      const fill = related.length<4 ? [...related, ...PRODUCTS.filter(x=>x.bestSeller&&x.id!==p.id&&!related.includes(x))].slice(0,4) : related;
      document.querySelector("[data-related]").innerHTML = fill.map((x,i)=>`<div data-reveal data-reveal-delay="${i*70}">${productCard(x)}</div>`).join("");
      if (window.initReveal) initReveal();
      window.scrollTo({top:0});
    });
  </script>
</body>
</html>
